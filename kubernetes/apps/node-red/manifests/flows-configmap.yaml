        {
            "id": "a54023cf17ffdf96",
            "type": "function",
            "z": "b016700d924c37ba",
            "name": "build_wp_business_telemetry",
            "func": "const ev = msg.businessEvent || msg.payload || {};\n\nconst eventType = ev.event_type || \"unknown\";\nconst username = ev.user?.username || ev.username || \"unknown\";\n\nconst eventTime = ev.received_at || ev.timestamp || new Date().toISOString();\n\nlet businessEventType = \"unknown\";\n\nif (eventType === \"login\") {\n    businessEventType = \"login\";\n}\n\nif (eventType === \"cart_add\") {\n    businessEventType = \"add_item\";\n}\n\nif (eventType === \"order_created\") {\n    businessEventType = \"create_order\";\n}\n\nconst cartQty =\n    ev.cart?.total_qty ??\n    ev.cart_items ??\n    ev.cart_total_qty ??\n    0;\n\nconst orderQty =\n    ev.order?.total_qty ??\n    ev.order_items ??\n    ev.order_total_qty ??\n    0;\n\nlet message = `Ο χρήστης ${username} έκανε event ${businessEventType}`;\n\nif (eventType === \"cart_add\") {\n    message = `Ο χρήστης ${username} έβαλε προϊόν στο καλάθι. Σύνολο προϊόντων στο καλάθι: ${cartQty}`;\n}\n\nif (eventType === \"order_created\") {\n    message = `Ο χρήστης ${username} ολοκλήρωσε παραγγελία. Σύνολο προϊόντων: ${orderQty || 1}`;\n}\n\nif (eventType === \"login\") {\n    message = `Ο χρήστης ${username} έκανε login`;\n}\n\nmsg.payload = {\n    event_time: eventTime,\n    ts: eventTime,\n    username: username,\n\n    event_type: eventType,\n    business_event_type: businessEventType,\n\n    message: message,\n\n    product_id: ev.cart?.added_product_id || ev.product_id || null,\n    product_sku: ev.cart?.added_product_sku || ev.product_sku || null,\n    product_name: ev.cart?.added_product_name || ev.product_name || null,\n    quantity: ev.cart?.added_quantity || ev.quantity || 1,\n\n    cart_total_qty: cartQty,\n    order_total_qty: orderQty,\n    event_id: ev.event_id || \"\"\n};\n\nreturn msg;",
