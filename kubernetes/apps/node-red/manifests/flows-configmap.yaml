.eventTime || new Date().toISOString()\n };\n \n\n const rawMsg = { ...msg, payload: flat };\n \n \n const dlMsg = { ...msg, payload: flat };\n \n return [rawMsg, dlMsg];",             "outputs":  2,             "timeout":  0,             "noerr":  0,             "initialize":  "",             "finalize":  "",             "libs":  [                           ],             "x":  470,             "y":  120,             "wires":  [                           [                                ],                           [                               "c4e860022dee184b"                           ]                       ]         },         {             "id":  "707e1c30c4e6852e",             "type":  "http in",             "z":  "b016700d924c37ba",             "name":  "",             "url":  "/wp-event",             "method":  "post",             "upload":  false,             "skipBodyParsing":  false,             "swaggerDoc":  "",             "x":  160,             "y":  380,             "wires":  [                           [                               "15369ccd8703a38f"                           ]                       ]         },         {             "id":  "15369ccd8703a38f",             "type":  "json",             "z":  "b016700d924c37ba",             "name":  "",             "property":  "payload",             "action":  "",             "pretty":  false,             "x":  390,             "y":  380,             "wires":  [                           [                               "3ceb81deace8706e"                           ]                       ]         },         {             "id":  "3ceb81deace8706e",             "type":  "function",             "z":  "b016700d924c37ba",             "name":  "validate_wp_event",             "func":  "const expectedSecret = \"supersecret123\";\nconst receivedSecret = msg.req?.headers?.[\"x-event-secret\"];\n\n\nlet event = msg.payload;\n\nif (typeof event === \"string\") {\n    try { event = JSON.parse(event); } cat