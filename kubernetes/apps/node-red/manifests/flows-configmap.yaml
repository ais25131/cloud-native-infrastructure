on":  "us-east-1",             "name":  "Minio events",             "x":  1080,             "y":  420,             "wires":  [                            ]         },         {             "id":  "de26b1d9be6f695e",             "type":  "function",             "z":  "b016700d924c37ba",             "name":  "normalize_object_key",             "func":  "const bucket = msg.payload.bucket;\nlet key = msg.payload.objectKey;\n\n\nif (key \u0026\u0026 bucket \u0026\u0026 key.startsWith(bucket + \"/\")) {\n    key = key.slice((bucket + \"/\").length);\n}\n\n\nif (key) {\n    try {\n        key = decodeURIComponent(key.replace(/\\+/g, \u0027%20\u0027));\n    } catch (e) {\n        // ignore\n    }\n}\n\nmsg.minio = { bucket, key };\nreturn msg;",             "outputs":  1,             "timeout":  0,             "noerr":  0,             "initialize":  "",             "finalize":  "",             "libs":  [                           ],             "x":  760,             "y":  140,             "wires":  [                           [                               "c3fc4e3664a76c21"                           ]                       ]         },         {             "id":  "747bf408966287d0",             "type":  "mqtt out",             "z":  "b016700d924c37ba",             "name":  "",             "topic":  "v1/devices/me/telemetry",             "qos":  "",             "retain":  "",             "respTopic":  "",             "contentType":  "",             "userProps":  "",             "correl":  "",             "expiry":  "",             "broker":  "eea479fe5b198964",             "x":  1290,             "y":  140,             "wires":  [                            ]         },         {             "id":  "c4e860022dee184b",             "type":  "function",             "z":  "b016700d924c37ba",             "name":  "filter_only_object_created",             "func":  "// function: filter_only_object_created\nconst ev = msg.payload?.event || \"\";\n\n\nif (!ev.startsWith(\"s3:ObjectCreated:\")) {\n \n  return null;\n}\n\nreturn msg;",             "outputs":  1,             "timeout":  0,             "noerr":  0,             "initialize":  "",             "finalize":  "",             "libs":  [                           ],             "x":  590,             "y":  200,             "wires":  [                           [                               "de26b1d9be6f695e"                           ]                       ]         },         {             "id":  "678c930f8d317a67",             "type":  "amqp-in",             "z":  "b016700d924c37ba",             "name":  "",             "broker":  "7bfec4c89afd5431",             "prefetch":  0,             "noAck":  true,             "exchangeName":  "",             "exchangeType":  "topic",             "exchangeRoutingKey":  "",             "exchangeDurable":  true,             "queueName":  "orders",             "queueExclusive":  false,             "queueDurable":  false,             "queueAutoDelete":  false,             "headers":  "{}",             "x":  200,             "y":  740,             "wires":  [                           [                               "b6b1ccafe7baced5"                           ]                       ]         },         {             "id":  "b6b1ccafe7baced5",             "type":  "json",             "z":  "b016700d924c37ba",             "name":  "",             "property":  "payload",             "action":  "",             "pretty":  false,             "x":  410,             "y":  740,             "wires":  [                           [                               "6b90fa1554292735"                           ]                       ]         },         {             "id":  "6b90fa1554292735",             "type":  "function",             "z":  "b016700d924c37ba",             "name":  "build_tb_telemetry",             "func":  "let order = msg.payload;\n\n// Αν έρθει ως string, κάνε parse\nif (typeof order === \"string\") {\n    order = JSON.parse(order);\n}\n