        {
            "id": "791cbca18c91ae35",
            "type": "function",
            "z": "b016700d924c37ba",
            "name": "build_minio_object",
            "func": "const ev = msg.businessEvent || msg.payload || {};\n\nconst eventType = ev.event_type || \"unknown\";\nconst username = ev.user?.username || ev.username || \"unknown\";\n\nconst eventTime = ev.received_at || ev.timestamp || new Date().toISOString();\nconst d = new Date(eventTime);\n\nconst year = d.getFullYear();\nconst month = String(d.getMonth() + 1).padStart(2, \"0\");\nconst day = String(d.getDate()).padStart(2, \"0\");\n\nlet folder = \"unknown\";\n\nif (eventType === \"login\") {\n    folder = \"login\";\n}\n\nif (eventType === \"cart_add\") {\n    folder = \"add_item\";\n}\n\nif (eventType === \"order_created\") {\n    folder = \"create_order\";\n}\n\nconst safeUsername = String(username).replace(/[^a-zA-Z0-9._-]/g, \"_\");\nconst eventId = String(ev.event_id || Date.now()).replace(/[^a-zA-Z0-9._-]/g, \"_\");\n\nconst objectKey = `${folder}/${year}/${month}/${day}/${eventId}_${safeUsername}.json`;\n\nmsg.payload = JSON.stringify(ev, null, 2);\n\nmsg.bucket = \"events\";\nmsg.filename = objectKey;\n\nreturn msg;",
            "outputs": 1,
            "timeout": 0,
            "noerr": 0,
            "initialize": "",
            "finalize": "",
