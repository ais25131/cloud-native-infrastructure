,             "z":  "b016700d924c37ba",             "name":  "build_wp_business_telemetry",             "func":  "const ev = msg.event || msg.payload || {};\nconst type = ev.event_type || \"unknown\";\nconst username = ev.user?.username || \"unknown\";\n\nfunction countItems(items) {\n  if (!Array.isArray(items)) return 0;\n  return items.reduce((sum, item) =\u003e sum + (Number(item.qty) || 0), 0);\n}\n\nconst cartItems = countItems(ev.cart?.items);\nconst orderItems = countItems(ev.order?.items);\n\nlet message = `Ο χρήστης ${username} έκανε event ${type}`;\n\nif (type === \"login\") {\n  message = `Ο χρήστης ${username} συνδέθηκε στο e-shop`;\n}\n\nif (type === \"cart_add\") {\n  message = `Ο χρήστης ${username} έβαλε προϊόν στο καλάθι. Σύνολο προϊόντων στο καλάθι: ${cartItems}`;\n}\n\nif (type === \"order_created\") {\n  message = `Ο χρήστης ${username} αγόρασε ${orderItems} προϊόν`;\n}\n\nmsg.payload = {\n  source: \"wordpress\",\n  username: username,\n  business_event_type: type,\n  cart_items: cartItems,\n  order_items: orderItems,\n  message: message,\n  event_time: new Date().toISOString()\n};\n\nreturn msg;",             "outputs":  1,             "timeout":  0,             "noerr":  0,             "initialize":  "",             "finalize":  "",             "libs":  [                           ],             "x":  910,             "y":  340,             "wires":  [                           [                               "b65023957439ef71",                               "829b99b6b8a3feb1"                           ]                       ]         },         {             "id":  "829b99b6b8a3feb1",             "type":  "mqtt out",             "z":  "b016700d924c37ba",             "name":  "",             "topic":  "v1/devices/me/telemetry",             "qos":  "",             "retain":  "",             "respTopic":  "",             "contentType":  "",             "userProps":  "",             "correl":  "",             "expiry":  "",             "broker"