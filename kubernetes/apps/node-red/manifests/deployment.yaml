apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-red
  namespace: node-red
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-red
  template:
    metadata:
      labels:
        app: node-red
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "node-red-role"
        vault.hashicorp.com/agent-inject-secret-node-red.env: "secret/data/node-red"
        vault.hashicorp.com/agent-inject-template-node-red.env: |
          {{- with secret "secret/data/node-red" -}}
          export RABBITMQ_HOST="{{ .Data.data.rabbitmq_host }}"
          export RABBITMQ_USER="{{ .Data.data.rabbitmq_user }}"
          export RABBITMQ_PASSWORD="{{ .Data.data.rabbitmq_password }}"
          export MINIO_ENDPOINT="{{ .Data.data.minio_endpoint }}"
          export THINGSBOARD_TOKEN="{{ .Data.data.thingsboard_token }}"
          {{- end }}
    spec:
      serviceAccountName: node-red
      initContainers:
        - name: import-node-red-flows
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /import/flows.json /data/flows.json
          volumeMounts:
            - name: node-red-flows-import
              mountPath: /import
            - name: node-red-storage
              mountPath: /data

      containers:
        - name: node-red
          image: nodered/node-red:latest
          command:
            - sh
            - -c
          args:
            - . /vault/secrets/node-red.env && npm start -- --userDir /data
          ports:
            - containerPort: 1880
          volumeMounts:
            - name: node-red-storage
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: node-red-storage
          persistentVolumeClaim:
            claimName: node-red-pvc
        - name: node-red-flows-import
          configMap:
            name: node-red-flows

---
apiVersion: v1
kind: Service
metadata:
  name: node-red
  namespace: node-red
spec:
  selector:
    app: node-red
  ports:
    - port: 1880
      targetPort: 1880