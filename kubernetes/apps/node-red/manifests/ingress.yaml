apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-red-local-ingress
  namespace: node-red
spec:
  ingressClassName: traefik
  rules:
    - host: node-red.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: node-red-local
                port:
                  number: 80