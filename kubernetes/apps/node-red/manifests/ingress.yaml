apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: node-red-host-header
  namespace: kourier-system
spec:
  headers:
    customRequestHeaders:
      Host: node-red-knative.node-red.svc.cluster.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-red-local-to-kourier
  namespace: kourier-system
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: kourier-system-node-red-host-header@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: node-red.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kourier
                port:
                  number: 80