apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0.6

          args:
            - start-dev
            - --hostname=http://192.168.56.21:30080
            - --hostname-strict=false
            - --http-enabled=true
            - --import-realm

          ports:
            - containerPort: 8080

          env:
            - name: KC_DB
              value: postgres

            - name: KC_DB_URL_HOST
              value: keycloak-postgres

            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_DB

            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_USER

            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-postgres-secret
                  key: POSTGRES_PASSWORD

          envFrom:
            - secretRef:
                name: keycloak-secret

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          volumeMounts:
            - name: keycloak-realm-import
              mountPath: /opt/keycloak/data/import/realm-export.json
              subPath: realm-export.json

      volumes:
        - name: keycloak-realm-import
          configMap:
            name: keycloak-realm-import

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080