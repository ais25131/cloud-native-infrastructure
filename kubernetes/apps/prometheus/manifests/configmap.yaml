apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/rules.yml

    scrape_configs:
      - job_name: 'pushgateway'
        static_configs:
          - targets:
              - pushgateway.monitoring.svc.cluster.local:9091

      - job_name: 'rabbitmq'
        metrics_path: /metrics
        static_configs:
          - targets:
              - rabbitmq.rabbitmq.svc.cluster.local:15692

  rules.yml: |
    groups:
      - name: application-scaling-alerts
        rules:
          - alert: RabbitMQQueueBacklog
            expr: rabbitmq_queue_messages_ready{queue="events"} > 5
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "RabbitMQ queue backlog detected"
              description: "Queue events has more than 5 pending messages for 1 minute."

          - alert: OrderAPIEventsDetected
            expr: increase(order_api_events_received_total[1m]) > 0
            for: 0m
            labels:
              severity: info
            annotations:
              summary: "Order API received events"
              description: "Order API received events during the last minute."