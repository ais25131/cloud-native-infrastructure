apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        config-version: "v2"

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus

          ports:
            - containerPort: 9090

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=24h"

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config