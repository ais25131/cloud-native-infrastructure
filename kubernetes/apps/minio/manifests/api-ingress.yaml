apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: minio-console-ingress
  namespace: minio

spec:
  ingressClassName: public

  rules:
    - host: minio-console.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001