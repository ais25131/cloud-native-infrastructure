apiVersion: batch/v1
kind: Job
metadata:
  name: minio-rabbitmq-notification-setup
  namespace: minio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "vault-role"
        vault.hashicorp.com/agent-inject-secret-minio: "secret/data/minio"
        vault.hashicorp.com/agent-inject-template-minio: |
          {{- with secret "secret/data/minio" -}}
          export MINIO_ROOT_USER={{ .Data.data.username }}
          export MINIO_ROOT_PASSWORD={{ .Data.data.password }}
          {{- end }}
    spec:
      serviceAccountName: vault-serviceaccount
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: minio/mc:RELEASE.2025-04-16T18-13-26Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              . /vault/secrets/minio

              mc alias set local http://minio.minio.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

              mc mb --ignore-existing local/orders

              mc admin config set local notify_amqp:1 \
                url="amqp://user:password@rabbitmq.rabbitmq.svc.cluster.local:5672" \
                exchange="amq.topic" \
                exchange_type="topic" \
                routing_key="system.minio" \
                mandatory="off" \
                durable="on" \
                no_wait="off"

              sleep 10

              mc event remove local/orders arn:minio:sqs::1:amqp --event put,delete || true
              mc event add local/orders arn:minio:sqs::1:amqp --event put,delete
              mc event list local/orders