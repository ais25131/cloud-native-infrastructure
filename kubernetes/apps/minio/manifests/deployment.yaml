apiVersion: apps/v1
kind: Deployment

metadata:
  name: minio
  namespace: minio

spec:
  replicas: 1

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      containers:
        - name: minio
          image: minio/minio:latest

          args:
            - server
            - /data
            - --console-address
            - ":9001"

          ports:
            - name: api
              containerPort: 9000

            - name: console
              containerPort: 9001

          envFrom:
            - secretRef:
                name: minio-secret

          env:
            - name: MINIO_BROWSER_REDIRECT_URL
              value: "http://minio-console.local"

            - name: MINIO_SERVER_URL
              value: "http://minio.local"

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          volumeMounts:
            - name: minio-storage
              mountPath: /data

      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc
