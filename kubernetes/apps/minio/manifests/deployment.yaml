apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "minio-role"
        vault.hashicorp.com/agent-inject-secret-minio.env: "secret/data/minio"
        vault.hashicorp.com/agent-requests-cpu: "25m"
        vault.hashicorp.com/agent-limits-cpu: "100m"
        vault.hashicorp.com/agent-requests-mem: "32Mi"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
        vault.hashicorp.com/agent-inject-template-minio.env: |
          {{- with secret "secret/data/minio" -}}
          export MINIO_ROOT_USER="{{ .Data.data.minio_root_user }}"
          export MINIO_ROOT_PASSWORD="{{ .Data.data.minio_root_password }}"
          {{- end }}
    spec:
      serviceAccountName: minio
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - sh
            - -c
          args:
            - . /vault/secrets/minio.env && minio server /data --console-address ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_BROWSER_REDIRECT_URL
              value: "http://minio-console.local"
            - name: MINIO_SERVER_URL
              value: "http://minio.minio.svc.cluster.local:9000"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: minio-storage
              mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc