apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - mariadb-secret.yaml
  - mariadb-pvc.yaml
  - mariadb.yaml
  - wordpress-pvc.yaml
  - deployment.yaml
  - ingress.yaml

configMapGenerator:
  - name: tb-events-plugin
    namespace: wordpress
    files:
      - tb-events.php=../plugin/tb-events.php

generatorOptions:
  disableNameSuffixHash: true