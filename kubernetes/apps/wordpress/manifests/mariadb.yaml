apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-mariadb
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-mariadb
  template:
    metadata:
      labels:
        app: wordpress-mariadb
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "wordpress-mariadb-role"
        vault.hashicorp.com/agent-inject-secret-wordpress-db.env: "secret/data/wordpress-db"
        vault.hashicorp.com/agent-requests-cpu: "25m"
        vault.hashicorp.com/agent-limits-cpu: "100m"
        vault.hashicorp.com/agent-requests-mem: "32Mi"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
        vault.hashicorp.com/agent-inject-template-wordpress-db.env: |
          {{- with secret "secret/data/wordpress-db" -}}
          export MYSQL_DATABASE="{{ .Data.data.mysql_database }}"
          export MYSQL_USER="{{ .Data.data.mysql_user }}"
          export MYSQL_PASSWORD="{{ .Data.data.mysql_password }}"
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.mysql_root_password }}"
          {{- end }}
    spec:
      serviceAccountName: wordpress-mariadb
      containers:
        - name: mariadb
          image: mariadb:11
          command:
            - sh
            - -c
          args:
            - . /vault/secrets/wordpress-db.env && docker-entrypoint.sh mariadbd
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: wordpress-mariadb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-mariadb
  namespace: wordpress
spec:
  selector:
    app: wordpress-mariadb
  ports:
    - port: 3306
      targetPort: 3306