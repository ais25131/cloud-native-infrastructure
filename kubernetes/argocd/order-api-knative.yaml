apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-api-knative
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ais25131/cloud-native-infrastructure.git
    targetRevision: main
    path: kubernetes/apps/knative/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: order-api

  syncPolicy:
    automated:
      prune: true
      selfHeal: true