apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: rabbitmq
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ais25131/cloud-native-infrastructure.git
    targetRevision: main
    path: kubernetes/apps/rabbitmq/manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true